name: Weekly Naver Webtoon Series Mapping Update

on:
  schedule:
    # 09:00 KST every Monday = 00:00 UTC every Monday.
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: webtoon-download-data-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-mapping:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main before mapping update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly mapping updater
        env:
          TZ: Asia/Seoul
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # 0 = 기존 productNo 재사용, 신규/미매칭만 검색
          # 1 = 전체 재검색
          FORCE_RECHECK_ALL: "0"
        run: |
          python scripts/update_mapping.py

      - name: Commit and push updated mapping data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Naver Webtoon Series mapping"
          git pull --rebase origin main
          git push
